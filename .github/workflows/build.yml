name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
      SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
      SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
      SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode and Prepare Keystore
        run: |
          if [[ -z "$SIGNING_KEYSTORE_BASE64" ]]; then
            echo "Error: SIGNING_KEYSTORE_BASE64 secret is missing!"
            exit 1
          fi
          if [[ -z "$SIGNING_STORE_PASSWORD" || -z "$SIGNING_KEY_ALIAS" || -z "$SIGNING_KEY_PASSWORD" ]]; then
            echo "Error: One or more signing secrets are missing!"
            exit 1
          fi

          mkdir -p app/keystore
          echo "Decoding keystore..."
          echo "$SIGNING_KEY_STORE_BASE64" | base64 --decode > app/keystore/myrelease.jks

          # Populate credential files for Gradle local fallback logic
          echo "$SIGNING_STORE_PASSWORD" > app/keystore/storePassword.txt
          echo "$SIGNING_KEY_ALIAS" > app/keystore/keyAlias.txt
          echo "$SIGNING_KEY_PASSWORD" > app/keystore/keyPassword.txt

          # Final validation
          if [[ ! -s app/keystore/myrelease.jks ]]; then
            echo "Error: Decoded keystore file is empty!"
            exit 1
          fi

      - name: Build Debug APK
        env:
          SIGNING_STORE_FILE: keystore/myrelease.jks
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/foss/debug/*.apk
