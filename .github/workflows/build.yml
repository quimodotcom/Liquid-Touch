name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SIGNING_KEY_STORE_BASE64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
      SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD || 'dummydefault' }}
      SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS || 'dummy' }}
      SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD || 'dummydefault' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode and Prepare Keystore
        run: |
          mkdir -p app/keystore
          if [[ -n "$SIGNING_KEY_STORE_BASE64" ]]; then
            echo "Using provided signing secret..."
            echo "$SIGNING_KEY_STORE_BASE64" | base64 --decode > app/keystore/myrelease.jks
          else
            echo "Generating deterministic dummy keystore..."
            keytool -genkey -v -keystore app/keystore/myrelease.jks -alias "$SIGNING_KEY_ALIAS" -keyalg RSA -keysize 2048 -validity 10000 -storepass "$SIGNING_STORE_PASSWORD" -keypass "$SIGNING_KEY_PASSWORD" -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown"
          fi
          # Ensure credentials files exist for local-fallback logic in build.gradle
          echo "$SIGNING_STORE_PASSWORD" > app/keystore/storePassword.txt
          echo "$SIGNING_KEY_ALIAS" > app/keystore/keyAlias.txt
          echo "$SIGNING_KEY_PASSWORD" > app/keystore/keyPassword.txt

          # Verify keystore
          if [[ ! -s app/keystore/myrelease.jks ]]; then
            echo "Keystore file is empty or missing!"
            exit 1
          fi

      - name: Build Debug APK
        env:
          SIGNING_STORE_FILE: keystore/myrelease.jks
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/foss/debug/*.apk
